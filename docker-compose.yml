name: rag-okf

services:
  # ── Ollama: LLM + embeddings + verifier (GPU) ──────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: nvidia
#              count: 1
#              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Qdrant: vector database ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── Ingest: PDF watcher → OKF bundle → embed → Qdrant ─────────────
  ingest:
    build: ./services/ingest
    container_name: rag-ingest
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
      - QDRANT_HOST=${QDRANT_HOST}
      - EMBED_MODEL=${EMBED_MODEL}
      - COLLECTION_NAME=${COLLECTION_NAME}
    volumes:
      - ./pdfs:/data/pdfs
      - ./okf:/data/okf

  # ── API: FastAPI orchestrator (retrieve → generate → verify) ───────
  api:
    build: ./services/api
    container_name: rag-api
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
      - QDRANT_HOST=${QDRANT_HOST}
      - EMBED_MODEL=${EMBED_MODEL}
      - LLM_MODEL=${LLM_MODEL}
      - VERIFIER_MODEL=${VERIFIER_MODEL}
      - COLLECTION_NAME=${COLLECTION_NAME}
    volumes:
      - ./okf:/data/okf

  # ── Web UI: Open WebUI chat interface ──────────────────────────────
  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rag-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://api:8000/v1
      - OPENAI_API_KEY=local
    volumes:
      - ./webui_data:/app/backend/data
    depends_on:
      - api
